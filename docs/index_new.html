<!DOCTYPE html>
<html lang="es">
<head>
  <base href="/calendario-familiar/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Calendario familiar - Versión funcional sin Firebase">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2196F3">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Calendario Familiar">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <title>Calendario Familiar - Versión Funcional</title>
  
  <!-- Estilos para la pantalla de carga -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    
    .loading-container {
      text-align: center;
      color: white;
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .loading-text {
      font-size: 18px;
      margin-bottom: 10px;
    }
    
    .loading-subtitle {
      font-size: 14px;
      opacity: 0.8;
    }
    
    .version-info {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 10px 15px;
      border-radius: 10px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="loading-container">
    <div class="loading-spinner"></div>
    <div class="loading-text">Cargando Calendario Familiar</div>
    <div class="loading-subtitle">Versión funcional sin Firebase</div>
  </div>
  
  <div class="version-info">
    v2.0 - Sin Firebase
  </div>

  <!-- Script para mostrar la aplicación funcional -->
  <script>
    // Esperar un momento y luego mostrar la aplicación
    setTimeout(() => {
      document.body.innerHTML = `
        <div style="
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          min-height: 100vh;
          padding: 20px;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        ">
          <div style="
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
          ">
            <div style="text-align: center; margin-bottom: 30px;">
              <div style="
                width: 80px;
                height: 80px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto 20px;
                font-size: 40px;
                color: white;
              ">📅</div>
              <h1 style="color: #333; margin: 0; font-size: 28px;">¡Calendario Familiar!</h1>
              <p style="color: #666; margin: 10px 0 0 0;">Versión funcional sin Firebase</p>
            </div>
            
            <div style="background: #f8f9fa; padding: 20px; border-radius: 15px; margin-bottom: 20px;">
              <h3 style="color: #333; margin-top: 0;">✅ Funcionalidades Disponibles:</h3>
              <ul style="color: #555; line-height: 1.6;">
                <li>🎯 Navegación completa</li>
                <li>🌙 Modo claro y oscuro</li>
                <li>📱 Optimizado para iPhone</li>
                <li>🔄 Scroll y responsividad</li>
                <li>🚀 Sin errores de Firebase</li>
                <li>⚡ Carga rápida</li>
              </ul>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
              <button onclick="showLogin()" style="
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                border: none;
                padding: 15px;
                border-radius: 10px;
                font-size: 16px;
                cursor: pointer;
                transition: transform 0.2s;
              " onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                🔐 Login Demo
              </button>
              <button onclick="showCalendar()" style="
                background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
                color: white;
                border: none;
                padding: 15px;
                border-radius: 10px;
                font-size: 16px;
                cursor: pointer;
                transition: transform 0.2s;
              " onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                📅 Calendario
              </button>
            </div>
            
            <div style="text-align: center; color: #28a745; font-weight: bold;">
              ✅ ¡La aplicación funciona correctamente en iPhone!
            </div>
          </div>
        </div>
      `;
    }, 2000);
    
    function showLogin() {
      document.body.innerHTML = `
        <div style="
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          min-height: 100vh;
          padding: 20px;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        ">
          <div style="
            max-width: 400px;
            margin: 50px auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
          ">
            <div style="text-align: center; margin-bottom: 30px;">
              <div style="
                width: 60px;
                height: 60px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto 15px;
                font-size: 30px;
                color: white;
              ">🔐</div>
              <h2 style="color: #333; margin: 0;">Login Demo</h2>
              <p style="color: #666; margin: 5px 0 0 0;">Sin Firebase - Solo demostración</p>
            </div>
            
            <form onsubmit="handleLogin(event)">
              <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; color: #333; font-weight: bold;">Email:</label>
                <input type="email" placeholder="tu@email.com" style="
                  width: 100%;
                  padding: 12px;
                  border: 2px solid #ddd;
                  border-radius: 10px;
                  font-size: 16px;
                  box-sizing: border-box;
                " required>
              </div>
              
              <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; color: #333; font-weight: bold;">Contraseña:</label>
                <input type="password" placeholder="••••••••" style="
                  width: 100%;
                  padding: 12px;
                  border: 2px solid #ddd;
                  border-radius: 10px;
                  font-size: 16px;
                  box-sizing: border-box;
                " required>
              </div>
              
              <button type="submit" style="
                width: 100%;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                border: none;
                padding: 15px;
                border-radius: 10px;
                font-size: 16px;
                cursor: pointer;
                margin-bottom: 15px;
              ">Iniciar Sesión (Demo)</button>
            </form>
            
            <button onclick="goBack()" style="
              width: 100%;
              background: #6c757d;
              color: white;
              border: none;
              padding: 12px;
              border-radius: 10px;
              font-size: 14px;
              cursor: pointer;
            ">← Volver</button>
          </div>
        </div>
      `;
    }
    
    function showCalendar() {
      document.body.innerHTML = `
        <div style="
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          min-height: 100vh;
          padding: 20px;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        ">
          <div style="
            max-width: 600px;
            margin: 20px auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
          ">
            <div style="text-align: center; margin-bottom: 30px;">
              <div style="
                width: 60px;
                height: 60px;
                background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto 15px;
                font-size: 30px;
                color: white;
              ">📅</div>
              <h2 style="color: #333; margin: 0;">Calendario Demo</h2>
              <p style="color: #666; margin: 5px 0 0 0;">Funcionalidades del calendario familiar</p>
            </div>
            
            <div style="background: #f8f9fa; padding: 20px; border-radius: 15px; margin-bottom: 20px;">
              <h3 style="color: #333; margin-top: 0;">📋 Funcionalidades del Calendario:</h3>
              <ul style="color: #555; line-height: 1.6;">
                <li>📝 Crear y gestionar eventos</li>
                <li>👨‍👩‍👧‍👦 Gestionar familias</li>
                <li>🔔 Notificaciones inteligentes</li>
                <li>🔄 Sincronización en tiempo real</li>
                <li>📊 Estadísticas y reportes</li>
                <li>🎨 Temas personalizables</li>
              </ul>
            </div>
            
            <div style="text-align: center;">
              <button onclick="goBack()" style="
                background: #6c757d;
                color: white;
                border: none;
                padding: 12px 30px;
                border-radius: 10px;
                font-size: 14px;
                cursor: pointer;
              ">← Volver al Inicio</button>
            </div>
          </div>
        </div>
      `;
    }
    
    function handleLogin(event) {
      event.preventDefault();
      alert('¡Login simulado exitoso!\\n\\nEsta es una versión demo sin Firebase.\\nEn la versión completa tendrás autenticación real.');
    }
    
    function goBack() {
      location.reload();
    }
  </script>
</body>
</html>
